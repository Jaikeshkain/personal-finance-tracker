<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background circular gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1322"/>
      <stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
    <!-- Icon logo gradient -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background shape -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" stroke="#222736" stroke-width="8"/>
  <!-- Decorative glowing blur circle behind logo -->
  <circle cx="256" cy="256" r="120" fill="#a855f7" opacity="0.15" filter="url(#glow)" />
  <!-- Arrow shape -->
  <path d="M180 340 L340 180 M340 180 L240 180 M340 180 L340 280" stroke="url(#logo-grad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <!-- Rupee Symbol -->
  <text x="170" y="270" font-family="'Outfit', sans-serif" font-weight="900" font-size="96" fill="#ffffff" filter="url(#glow)">₹</text>
</svg>
